<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications</title>
    <link rel="stylesheet" href="../css/appStyles.css" />
  </head>
  <body>
    <div class="appContainer">
      <header class="modernHeader">
        <button class="modernBackButton" onclick="goBack()">
          <img
            src="../assets/icons/navigation/back.svg"
            class="icon navigationIcon"
            alt="Back"
          />
        </button>
        <h1 class="modernPageTitle">Notifications</h1>
      </header>
      <main class="pageContent">
        <div id="notificationList"></div>
        <div class="bottomActionBar">
          <button class="secondaryButton" onclick="markAllNotificationsRead()">
            Mark All Read
          </button>
          <button class="dangerButton" onclick="clearNotifications()">
            Clear All
          </button>
        </div>
      </main>
    </div>
    <script src="../js/stateManager.js"></script>
    <script src="../js/helpers.js"></script>
    <script src="../js/notificationsPage.js"></script>
  </body>
</html>
